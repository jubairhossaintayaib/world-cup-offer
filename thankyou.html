<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You – Celures</title>
<!-- Meta Pixel Code -->

<noscript><img height="1" width="1" style="display:none"
src="https://www.facebook.com/tr?id=1517308272696814&ev=PageView&noscript=1"/></noscript>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a; --white: #fafafa;
    --gray-100: #f4f4f2; --gray-200: #e8e8e4;
    --gray-400: #b0b0a8; --gray-600: #6e6e68;
    --green: #25D366;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
  }
  html, body { height: 100%; }
  body {
    font-family: var(--sans); background: var(--white); color: var(--black);
    -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh;
  }
  nav {
    border-bottom: 1px solid var(--gray-200); padding: 0 20px; height: 56px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo img { height: 22px; width: auto; display: block; }
  .page {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 24px 60px; text-align: center;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .check-circle {
    width: 64px; height: 64px; border-radius: 50%;
    border: 1.5px solid var(--black); display: flex;
    align-items: center; justify-content: center; margin-bottom: 24px;
  }
  .check-circle svg { width: 28px; height: 28px; }
  .ty-title { font-family: var(--serif); font-size: 46px; font-weight: 300; letter-spacing: 2px; margin-bottom: 10px; }
  .ty-sub { font-size: 16px; color: var(--gray-600); line-height: 1.7; max-width: 340px; margin-bottom: 8px; }
  .ty-bangla { font-size: 15px; color: var(--gray-400); line-height: 1.7; margin-bottom: 32px; }
  .divider { width: 40px; height: 1px; background: var(--gray-200); margin: 0 auto 28px; }
  .order-summary {
    background: var(--gray-100); border-radius: 14px; padding: 22px 24px;
    width: 100%; max-width: 400px; text-align: left; margin-bottom: 28px;
  }
  .summary-label { font-size: 11px; letter-spacing: 2.5px; color: var(--gray-600); text-transform: uppercase; margin-bottom: 14px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; font-size: 15px; color: var(--black); margin-bottom: 9px; }
  .summary-row .label { color: var(--gray-600); }
  .summary-divider { border: none; border-top: 1px solid var(--gray-200); margin: 12px 0; }
  .summary-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 600; }
  .order-items { border-top: 1px solid var(--gray-200); padding-top: 12px; margin-top: 4px; }
  .order-item { display: flex; align-items: center; gap: 8px; font-size: 15px; margin-bottom: 8px; color: var(--black); }
  .order-item.free-item { justify-content: space-between; }
  .item-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--black); flex-shrink: 0; }
  .item-dot.free-dot { background: #1a7a40; }
  .free-badge {
    font-size: 11px; background: #e8f5e9; color: #1a7a40;
    border: 1px solid #b6e2c8;
    border-radius: 20px; padding: 2px 10px; font-weight: 700; letter-spacing: 0.5px;
  }
  .back-btn {
    display: inline-block; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gray-600); text-decoration: none; border-bottom: 1px solid var(--gray-200);
    padding-bottom: 2px; transition: color 0.2s, border-color 0.2s;
  }
  .back-btn:hover { color: var(--black); border-color: var(--black); }
</style>
</head>
<body>
<nav><div class="logo"><img src="logo.png" alt="Celures"></div></nav>
<div class="page">
  <div class="check-circle">
    <svg viewBox="0 0 28 24" fill="none">
      <polyline points="2,12 10,20 26,2" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="ty-title">Thank You!</div>
  <div class="ty-sub">Your order has been received. We'll call you shortly to confirm before dispatch.</div>
  <div class="ty-bangla">আমরা শীঘ্রই আপনাকে কল করে অর্ডারটি নিশ্চিত করবো।</div>
  <div class="divider"></div>

  <div class="order-summary">
    <div class="summary-label">Order Summary</div>
    <div class="summary-row"><span class="label">Name</span><span id="sumName">—</span></div>
    <div class="summary-row"><span class="label">Phone</span><span id="sumPhone">—</span></div>
    <div class="summary-row" id="sumDistrictRow"><span class="label">District</span><span id="sumDistrict">—</span></div>

    <div class="order-items">
      <div class="summary-label" style="margin-bottom:10px;">Your Order — Buy 2 Get 1 FREE</div>
      <div id="orderItemsContainer"></div>
    </div>

    <hr class="summary-divider">
    <div class="summary-row"><span class="label">Perfume (2 paid)</span><span id="sumBasePrice">—</span></div>
    <div class="summary-row" id="sumDeliveryRow"><span class="label">Delivery</span><span id="sumDelivery">—</span></div>
    <hr class="summary-divider">
    <div class="summary-total">
      <span>Total (Cash on Delivery)</span>
      <span id="sumTotal" style="font-family:var(--sans);font-weight:500;">—</span>
    </div>
  </div>

  <a href="index.html" class="back-btn">← Back to store</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);

  const set = (id, val) => { const el = document.getElementById(id); if(el && val) el.textContent = val; };

  set('sumName',     params.get('name'));
  set('sumPhone',    params.get('phone'));
  set('sumDistrict', params.get('district'));

  const freeChoice = params.get('freeChoice'); // 'phantom' | 'executive'
  const delivery   = parseInt(params.get('delivery'));
  const total      = parseInt(params.get('total'));

  const BASE_PRICE = 1780; // Phantom Elixir + Executive Bleu, fixed

  const FREE_PERFUME_LABELS = {
    phantom:   'Phantom Elixir (30ml)',
    executive: 'Executive Bleu (30ml)'
  };

  // Build order items: 2 paid items + 1 free item (their choice)
  const itemsContainer = document.getElementById('orderItemsContainer');
  const paidItems = ['Phantom Elixir (30ml)', 'Executive Bleu (30ml)'];

  paidItems.forEach(name => {
    const div = document.createElement('div');
    div.className = 'order-item';
    div.innerHTML = `<div class="item-dot"></div><span>${name}</span>`;
    itemsContainer.appendChild(div);
  });

  const freeLabel = FREE_PERFUME_LABELS[freeChoice] || FREE_PERFUME_LABELS['phantom'];
  const freeDiv = document.createElement('div');
  freeDiv.className = 'order-item free-item';
  freeDiv.innerHTML = `<div style="display:flex;align-items:center;gap:8px;"><div class="item-dot free-dot"></div><span>${freeLabel}</span></div><span class="free-badge">FREE</span>`;
  itemsContainer.appendChild(freeDiv);

  // Base price — always fixed, no coupon/discount logic
  document.getElementById('sumBasePrice').textContent = 'Tk ' + BASE_PRICE.toLocaleString();

  // Delivery row
  if (!isNaN(delivery)) {
    document.getElementById('sumDelivery').textContent = 'Tk ' + delivery;
  }

  // Total
  if (!isNaN(total)) {
    document.getElementById('sumTotal').textContent = 'Tk ' + total.toLocaleString();
  } else {
    document.getElementById('sumTotal').textContent = 'Tk ' + BASE_PRICE.toLocaleString() + ' + delivery';
  }

  // Facebook Purchase event
  fbq('track', 'Purchase', {
    value: isNaN(total) ? BASE_PRICE : total,
    currency: 'BDT',
    content_type: 'product',
    content_name: 'Celures — Buy 2 Get 1 Free (Phantom Elixir + Executive Bleu + Free ' + freeLabel + ')'
  });
</script>
</body>
</html>
